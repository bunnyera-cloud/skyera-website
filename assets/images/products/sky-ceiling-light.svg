      <stop offset="0" stop-color="#04070d"/>
      <stop offset="1" stop-color="#0c1727"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="40%" r="55%">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#60a5fa" stop-opacity=".35"/>
